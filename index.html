<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>QR LinkVault</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#060810;--border:rgba(0,220,150,0.18);--accent:#00dc96;--accent2:#00aaff;--text:#dde6ef;--muted:#4a5568;--danger:#ff4d6d;--radius:12px}
body{background:var(--bg);font-family:'Space Mono',monospace;color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(0,220,150,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,220,150,0.025) 1px,transparent 1px);background-size:36px 36px;pointer-events:none}
.app{max-width:480px;margin:0 auto;padding:28px 16px 100px;position:relative;z-index:1}
.header{text-align:center;margin-bottom:28px}
.header-logo{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:4px}
.header h1{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header-sub{font-size:11px;color:var(--muted);letter-spacing:.18em;text-transform:uppercase;margin-top:4px}
.tabs{display:flex;gap:4px;background:rgba(255,255,255,.04);border-radius:10px;padding:4px;margin-bottom:24px}
.tab{flex:1;padding:9px 4px;border:none;background:transparent;color:var(--muted);font-family:inherit;font-size:12px;font-weight:700;border-radius:7px;cursor:pointer;transition:all .2s;text-transform:uppercase}
.tab.active{background:var(--accent);color:#000}
/* O html5-qrcode cria o elemento internamente, então controlamos via wrapper */
#reader-wrap{border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);background:#000;margin-bottom:16px;min-height:300px;position:relative}
#reader{width:100%}
/* Remove branding e botões desnecessários do html5-qrcode */
#reader__header_message{display:none!important}
#reader__dashboard_section_csr span{display:none}
#reader__status_span{font-family:'Space Mono',monospace!important;font-size:12px!important;color:var(--accent)!important}
#reader__camera_selection{background:#111;color:var(--text);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-family:inherit;font-size:12px;width:100%}
#reader__camera_permission_button{background:var(--accent)!important;color:#000!important;border:none!important;border-radius:8px!important;padding:10px 20px!important;font-family:inherit!important;font-weight:700!important;cursor:pointer!important}
.placeholder-box{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:rgba(0,0,0,.9);font-size:12px;color:var(--muted);text-align:center;padding:20px;border-radius:var(--radius)}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;border:none;border-radius:var(--radius);font-family:inherit;font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:all .18s}
.btn-primary{background:var(--accent);color:#000}
.btn-primary:active{filter:brightness(.9)}
.btn-stop{background:var(--danger);color:#fff}
.status{font-size:11px;color:var(--muted);text-align:center;margin-top:10px;min-height:18px}
.last-scan{padding:12px 14px;background:rgba(0,220,150,.07);border:1px solid rgba(0,220,150,.25);border-radius:var(--radius);margin-bottom:14px;font-size:12px}
.last-scan-label{color:var(--accent);font-size:10px;letter-spacing:.15em;text-transform:uppercase;margin-bottom:4px}
.last-scan-url{color:var(--text);word-break:break-all;line-height:1.6}
.list-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.list-count{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}
.link-card{background:rgba(255,255,255,.025);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px;transition:border-color .2s;animation:cIn .3s ease}
@keyframes cIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.link-card:hover{border-color:rgba(0,220,150,.4)}
.card-top{display:flex;align-items:flex-start;gap:10px;margin-bottom:6px}
.card-favicon{width:20px;height:20px;border-radius:4px;flex-shrink:0;margin-top:1px}
.card-url{font-size:12px;word-break:break-all;line-height:1.55;flex:1}
.card-url a{color:var(--accent2);text-decoration:none}
.card-url a:hover{text-decoration:underline}
.card-meta{display:flex;align-items:center;justify-content:space-between;margin-top:4px}
.card-date{font-size:10px;color:var(--muted)}
.card-actions{display:flex;gap:6px}
.icon-btn{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.07);border-radius:6px;padding:5px 8px;cursor:pointer;color:var(--muted);font-size:11px;font-family:inherit;transition:all .15s}
.icon-btn:hover{border-color:var(--accent);color:var(--accent)}
.icon-btn.del:hover{border-color:var(--danger);color:var(--danger)}
.empty{text-align:center;color:var(--muted);font-size:13px;padding:48px 20px;border:1px dashed rgba(255,255,255,.06);border-radius:var(--radius);line-height:2}
.export-btn{position:fixed;bottom:24px;right:20px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#000;border:none;border-radius:40px;padding:12px 20px;font-family:inherit;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;box-shadow:0 4px 20px rgba(0,220,150,.3);display:flex;align-items:center;gap:8px;z-index:100;transition:all .2s}
.badge{background:var(--accent);color:#000;border-radius:20px;padding:1px 8px;font-size:11px;font-weight:700;margin-left:6px}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);padding:10px 22px;border-radius:40px;font-size:13px;font-weight:700;z-index:9999;white-space:nowrap;pointer-events:none;animation:tIn .25s ease}
@keyframes tIn{from{opacity:0;transform:translateX(-50%) translateY(-8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.toast-success{background:var(--accent);color:#000}
.toast-error{background:var(--danger);color:#fff}
.toast-info{background:var(--accent2);color:#fff}
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="header-logo">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#00dc96" stroke-width="2.2">
        <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/>
        <path d="M14 14h3v3"/><path d="M17 14v7h-3"/><path d="M21 14v7"/>
      </svg>
      <h1>QR LinkVault</h1>
    </div>
    <div class="header-sub">Scan • Save • List</div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('scan')" id="tab-scan">📷 Scanner</button>
    <button class="tab" onclick="switchTab('list')" id="tab-list">🔗 Meus Links <span class="badge" id="badge">0</span></button>
  </div>

  <!-- SCAN TAB -->
  <div id="pane-scan">
    <div id="reader-wrap">
      <div id="reader"></div>
      <div class="placeholder-box" id="placeholderBox">
        <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" opacity="0.3">
          <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/>
          <path d="M14 14h3v3"/><path d="M17 14v7h-3"/><path d="M21 14v7"/>
        </svg>
        <span id="placeholderMsg">Câmera desligada</span>
      </div>
    </div>

    <div id="lastScanDiv" style="display:none" class="last-scan">
      <div class="last-scan-label">Último scan</div>
      <div class="last-scan-url" id="lastScanUrl"></div>
    </div>

    <button class="btn btn-primary" id="btnCamera" onclick="toggleCamera()">📷 Abrir Câmera</button>
    <div class="status" id="statusMsg"></div>
  </div>

  <!-- LIST TAB -->
  <div id="pane-list" style="display:none">
    <div class="list-header">
      <span class="list-count" id="listCount">0 links salvos</span>
      <button class="icon-btn del" onclick="clearAll()">🗑 Limpar tudo</button>
    </div>
    <div id="linkList"></div>
  </div>

</div>

<button class="export-btn" id="exportBtn" style="display:none" onclick="exportLinks()">⬇ Exportar</button>
<div id="toastEl" class="toast" style="display:none"></div>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script>
const STORAGE_KEY = 'qr-linkvault-v2';
let links = [];
let html5QrCode = null;
let scanning = false;
let cooldown = false;
let lastUrl = '';

// ── Storage ──────────────────────────────────────────────
function load() {
  try { links = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch { links = []; }
  render();
}
function persist() { localStorage.setItem(STORAGE_KEY, JSON.stringify(links)); render(); }

// ── Render ───────────────────────────────────────────────
function render() {
  document.getElementById('badge').textContent = links.length;
  document.getElementById('listCount').textContent =
    links.length + ' link' + (links.length !== 1 ? 's' : '') + ' salvo' + (links.length !== 1 ? 's' : '');
  document.getElementById('exportBtn').style.display = links.length ? 'flex' : 'none';
  const el = document.getElementById('linkList');
  if (!links.length) {
    el.innerHTML = '<div class="empty">Nenhum link ainda.<br>Escaneie um QR Code na aba Scanner.</div>';
    return;
  }
  el.innerHTML = links.map(l => `
    <div class="link-card">
      <div class="card-top">
        <img class="card-favicon" src="https://www.google.com/s2/favicons?domain=${dom(l.url)}&sz=32" onerror="this.style.display='none'"/>
        <div class="card-url"><a href="${xe(l.url)}" target="_blank" rel="noopener">${xe(l.url)}</a></div>
      </div>
      <div class="card-meta">
        <span class="card-date">${fmt(l.ts)}</span>
        <div class="card-actions">
          <button class="icon-btn" onclick="copyLink('${xe(l.url)}',this)">📋 Copiar</button>
          <button class="icon-btn del" onclick="delLink(${l.id})">✕</button>
        </div>
      </div>
    </div>`).join('');
}
function dom(u) { try { return new URL(u).hostname; } catch { return ''; } }
function fmt(ts) { return new Date(ts).toLocaleString('pt-BR',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}); }
function xe(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── Tabs ─────────────────────────────────────────────────
function switchTab(t) {
  ['scan','list'].forEach(k => {
    document.getElementById('pane-'+k).style.display = k===t?'block':'none';
    document.getElementById('tab-'+k).classList.toggle('active', k===t);
  });
}

// ── Scanner ───────────────────────────────────────────────
async function toggleCamera() {
  if (scanning) { await stopScanner(); return; }
  await startScanner();
}

async function startScanner() {
  setPlaceholder('Iniciando câmera...', false);
  setStatus('');

  html5QrCode = new Html5Qrcode('reader', { verbose: false });

  const config = {
    fps: 10,
    qrbox: function(w, h) {
      const size = Math.min(w, h) * 0.7;
      return { width: size, height: size };
    },
    aspectRatio: 1.0,
    experimentalFeatures: { useBarCodeDetectorIfSupported: true }
  };

  try {
    await html5QrCode.start(
      { facingMode: 'environment' },
      config,
      onScanSuccess,
      () => {} // falha silenciosa por frame
    );
    scanning = true;
    document.getElementById('placeholderBox').style.display = 'none';
    document.getElementById('btnCamera').className = 'btn btn-stop';
    document.getElementById('btnCamera').innerHTML = '⏹ Parar Câmera';
    setStatus('🔍 Aponte para o QR Code...');
  } catch(e) {
    let msg = '❌ Não foi possível acessar a câmera.';
    const s = String(e).toLowerCase();
    if (s.includes('permission') || s.includes('denied') || s.includes('notallowed')) {
      msg = '🚫 Permissão negada.<br>Toque no 🔒 na barra de endereço e libere a câmera.';
    } else if (s.includes('notfound') || s.includes('no camera')) {
      msg = '📷 Nenhuma câmera encontrada.';
    } else if (s.includes('notreadable') || s.includes('busy')) {
      msg = '⚠️ Câmera em uso por outro app.';
    }
    setPlaceholder(msg, true);
    html5QrCode = null;
    console.error('startScanner:', e);
  }
}

async function stopScanner() {
  if (html5QrCode) {
    try { await html5QrCode.stop(); } catch {}
    try { html5QrCode.clear(); } catch {}
    html5QrCode = null;
  }
  scanning = false;
  document.getElementById('reader').innerHTML = '';
  document.getElementById('placeholderBox').style.display = 'flex';
  document.getElementById('placeholderMsg').innerHTML = 'Câmera desligada';
  document.getElementById('placeholderMsg').style.color = 'var(--muted)';
  document.getElementById('btnCamera').className = 'btn btn-primary';
  document.getElementById('btnCamera').innerHTML = '📷 Abrir Câmera';
  setStatus('');
}

function onScanSuccess(decodedText) {
  if (cooldown) return;
  let url = (decodedText || '').trim();

  if (!/^https?:\/\//i.test(url)) {
    if (/\.\w{2,}/.test(url)) url = 'https://' + url;
    else { setStatus('⚠️ QR sem URL: ' + url.substring(0,40)); return; }
  }
  if (url === lastUrl) return;

  lastUrl = url;
  cooldown = true;
  setTimeout(() => { cooldown = false; lastUrl = ''; }, 3000);

  document.getElementById('lastScanDiv').style.display = 'block';
  document.getElementById('lastScanUrl').textContent = url;

  if (links.find(l => l.url === url)) {
    showToast('Link já salvo!', 'info');
    return;
  }

  links.unshift({ id: Date.now(), url, ts: Date.now() });
  persist();
  showToast('✓ Link salvo!', 'success');
  setStatus('✅ Capturado! Pode apontar para outro QR...');

  const w = document.getElementById('reader-wrap');
  w.style.boxShadow = '0 0 0 4px #00dc96';
  setTimeout(() => w.style.boxShadow = '', 1000);
}

// ── Helpers ───────────────────────────────────────────────
function setStatus(msg) { document.getElementById('statusMsg').textContent = msg; }
function setPlaceholder(msg, err) {
  document.getElementById('placeholderMsg').innerHTML = msg;
  document.getElementById('placeholderMsg').style.color = err ? 'var(--danger)' : 'var(--muted)';
  document.getElementById('placeholderBox').style.display = 'flex';
}
function delLink(id) { links = links.filter(l => l.id !== id); persist(); showToast('Removido','info'); }
function clearAll() {
  if (!confirm('Apagar todos os ' + links.length + ' links?')) return;
  links = []; persist(); showToast('Lista limpa','info');
}
function copyLink(url, btn) {
  navigator.clipboard.writeText(url)
    .then(() => { btn.textContent = '✓ Copiado'; setTimeout(() => btn.innerHTML = '📋 Copiar', 1500); })
    .catch(() => showToast('Erro ao copiar','error'));
}
function exportLinks() {
  const text = links.map((l,i) => `${i+1}. ${l.url}  [${fmt(l.ts)}]`).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([text],{type:'text/plain'}));
  a.download = 'meus-links.txt'; a.click();
  showToast('Exportado!','success');
}
let toastT;
function showToast(msg, type='success') {
  const el = document.getElementById('toastEl');
  el.textContent = msg; el.className = 'toast toast-'+type; el.style.display = 'block';
  clearTimeout(toastT);
  toastT = setTimeout(() => el.style.display = 'none', 2500);
}

load();
</script>
</body>
</html>
